scope = "rig"
# Arm C (G0 bake-off): the slop-reviewer is a deterministic orchestrator
# (sdlc-slop-armc.sh — tested scripts + one claude -p), not an open-ended Claude
# session. The prompt_template below is inert under this provider (the
# orchestrator ignores the composed argv); pre_start/work_dir still apply so the
# orchestrator has a worktree to checkout and diff. Swap back to provider="claude"
# for Arm A (incumbent) or to the Go-node provider for Arm B.
provider = "slop-armc"
prompt_template = "agents/slop-reviewer/prompt.template.md"
wake_mode = "fresh"
work_dir = ".gc/worktrees/{{.Rig}}/sdlc-slop-reviewers/{{.AgentBase}}"
nudge = "Run gc hook; review the assigned bead's diff for AI-coding slop patterns."
pre_start = ["{{.ConfigDir}}/assets/scripts/worktree-setup.sh {{.RigRoot}} {{.WorkDir}} {{.AgentBase}}"]
idle_timeout = "30m"
min_active_sessions = 0
max_active_sessions = 2
option_defaults = { model = "claude-opus-4-8" }
