scope = "rig"
provider = "claude"
prompt_template = "agents/slop-reviewer/prompt.template.md"
wake_mode = "fresh"
work_dir = ".gc/worktrees/{{.Rig}}/sdlc-slop-reviewers/{{.AgentBase}}"
nudge = "Run gc hook; review the assigned bead's diff for AI-coding slop patterns."
pre_start = ["{{.ConfigDir}}/assets/scripts/worktree-setup.sh {{.RigRoot}} {{.WorkDir}} {{.AgentBase}}"]
idle_timeout = "30m"
min_active_sessions = 0
max_active_sessions = 2
option_defaults = { model = "claude-opus-4-8" }
