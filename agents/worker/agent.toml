scope = "rig"
provider = "claude"
prompt_template = "agents/worker/prompt.template.md"
wake_mode = "fresh"
work_dir = ".gc/worktrees/{{.Rig}}/sdlc/{{.AgentBase}}"
nudge = "Run gc hook; check assigned work and routed pool work, then follow mol-sdlc-work."
pre_start = ["{{.ConfigDir}}/assets/scripts/worktree-setup.sh {{.RigRoot}} {{.WorkDir}} {{.AgentBase}}"]
idle_timeout = "1h"
min_active_sessions = 0
max_active_sessions = 5
# Pinned 2026-06-12: was deliberately unpinned (inherit host default) as the model-A/B lever;
# pinned to latest Opus on the incumbent's (claude-fable-5) expected sunset, so phases never
# ride an unstated host default. Partial A/B data: Opus 37/37 witnesses, 0 gate-fails.
option_defaults = { model = "claude-opus-4-8" }
