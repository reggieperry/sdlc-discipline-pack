scope = "rig"
provider = "claude"
prompt_template = "agents/tester/prompt.template.md"
wake_mode = "fresh"
work_dir = ".gc/worktrees/{{.Rig}}/sdlc-testers/{{.AgentBase}}"
nudge = "Run gc hook; check assigned work and routed pool work, then run the suite on the worker's branch."
pre_start = ["{{.ConfigDir}}/assets/scripts/worktree-setup.sh {{.RigRoot}} {{.WorkDir}} {{.AgentBase}}"]
idle_timeout = "30m"
min_active_sessions = 0
max_active_sessions = 3
