scope = "rig"
provider = "claude"
prompt_template = "agents/documenter/prompt.template.md"
wake_mode = "fresh"
work_dir = ".gc/worktrees/{{.Rig}}/sdlc-documenters/{{.AgentBase}}"
nudge = "Run gc hook; check assigned work and routed pool work, then write the feature doc and route to the finalizer."
pre_start = ["{{.ConfigDir}}/assets/scripts/worktree-setup.sh {{.RigRoot}} {{.WorkDir}} {{.AgentBase}}"]
idle_timeout = "30m"
min_active_sessions = 0
max_active_sessions = 2
option_defaults = { model = "claude-sonnet-4-6" }
