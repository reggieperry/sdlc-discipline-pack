[order]
description = "Periodic detector for the alive-and-idle worker-stall failure mode (Mode C, pack#86). For each in_progress chain bead with an assignee, computes elapsed time since the last bead.updated event. When the gap exceeds SDLC_ALIVE_IDLE_THRESHOLD_MINUTES (default 20), captures the worker's tmux pane and matches against the at-prompt signature (presence of '❯ ' + 'new task?' AND absence of busy markers like 'esc to interrupt', 'Brewed for', 'Implementing'). On match, invokes gc session submit <session-id> 'continue' --intent default to inject a synthetic user turn. Notifies the operator via sdlc-notify.sh on every nudge fired. Per-bead rate-limit via a state file under .gc/ prevents duplicate nudges within SDLC_ALIVE_IDLE_NUDGE_COOLDOWN_MINUTES (default 10). Defaults OFF — enable via SDLC_ALIVE_IDLE_DETECTOR_ENABLED=true in the supervisor's env. Fail-closed: any error logs and exits non-zero without firing a partial nudge."
trigger = "cooldown"
interval = "5m"
exec = "$PACK_DIR/assets/scripts/sdlc-alive-idle-detector.sh"
