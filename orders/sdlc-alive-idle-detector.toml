[order]
description = "Periodic detector for the alive-and-idle worker-stall failure mode (Mode C, pack#86). For each in_progress chain bead with an assignee, computes elapsed time since the last bead.updated event. When the gap exceeds SDLC_ALIVE_IDLE_THRESHOLD_MINUTES (default 20), captures the worker's tmux pane and matches against the at-prompt signature: REQUIRE the prompt glyph '❯' present; REJECT if the pane contains any busy marker ('esc to interrupt', 'Implementing…', 'Crafting…', 'Baking…'); REJECT if the pane contains any interactive-menu marker ('Enter to select', 'to navigate', 'Esc to cancel'). The v2.21.0–v2.21.3 'new task?' REQUIRE was dropped in v2.21.4 — that footer only renders near the per-turn cap and false-negatives on healthy-context idle. On match, invokes gc session submit <session-id> 'continue' --intent default to inject a synthetic user turn. Notifies the operator via sdlc-notify.sh on every nudge fired. Per-bead rate-limit via a state file under .gc/ prevents duplicate nudges within SDLC_ALIVE_IDLE_NUDGE_COOLDOWN_MINUTES (default 10). Defaults OFF — enable via SDLC_ALIVE_IDLE_DETECTOR_ENABLED=true in the supervisor's env. Fail-closed: any error logs and exits non-zero without firing a partial nudge. Signature revalidated 2026-05-25 on T7920; no drift."
trigger = "cooldown"
interval = "5m"
exec = "$PACK_DIR/assets/scripts/sdlc-alive-idle-detector.sh"
