[order]
description = "DORMANT since issue #191 (removed the review_encouraged tier this served). The scanner script early-exits unless SDLC_DELAYED_MERGE_ENABLED=true; the reviewer no longer emits review_encouraged so it would match zero beads regardless. Kept in the tree so a rig that re-introduces a middle tier via override can revive it. Original behavior: periodic scan for chain beads with final_state=pr_open_for_human AND review_recommendation=review_encouraged, merge past the delay window absent an objection."
trigger = "cooldown"
interval = "30m"
exec = "$PACK_DIR/assets/scripts/sdlc-delayed-merge.sh"
