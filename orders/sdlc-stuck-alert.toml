[order]
description = "Brooklyn stall alert (pack #212). Emails the operator when the pipeline is stranded awaiting a human, so green-looking PRs that silently stalled — or a bead a worker blocked on an architecture call — don't sit idle unnoticed. Two triggers: (1) bounce-exhausted PR — a bead at status=escalated + refresh_status=conflict (the finalizer's at-cap rebase-bounce branch); (2) blocked-for-decision — status=blocked + a human_decision_reason (a worker escalation). One digest email per rig per tick names every freshly-stranded bead with its actionable detail; each bead alerts at most once (deduped via stuck_alerted_at / blocked_alerted_at). Sends from the supervisor host via sdlc-notify.sh; on a real transport failure falls back to gc mail to the rig witness. Defaults OFF — enable via SDLC_STUCK_ALERT_ENABLED=true and set SDLC_NOTIFY_RECIPIENT. Order-firing liveness is sdlc-order-stall-detector's job; detector-blindness is caught by the companion sdlc-stuck-alert-selftest order."
trigger = "cooldown"
interval = "5m"
exec = "$PACK_DIR/assets/scripts/sdlc-stuck-alert.sh"
