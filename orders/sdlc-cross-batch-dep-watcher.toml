[order]
description = "Periodic admit-watcher for cross-batch dep edges. After stories.py file emits a `bd dep add` between two beads (pack #152) and defers the successor with metadata.cross_batch_dep_predecessors=<bead>[,<bead>...] (pack #154), this watcher polls every 5 minutes and clears the defer once all predecessors reach a terminal merge-equivalent final_state (merged | merged_delayed | branch_ready_no_pr). Detects rejected-PR cases (final_state=pr_open_for_human + GitHub state=CLOSED-not-merged) and escalates via sdlc-notify.sh. Closes the timing gap where the chain's finalizer parks the predecessor's bead at chain-end with status=closed but the human merges the PR hours later in the human_required tier. Opt-out via SDLC_CROSS_BATCH_DEP_WATCHER_ENABLED=false."
trigger = "cooldown"
interval = "5m"
exec = "$PACK_DIR/assets/scripts/sdlc-cross-batch-dep-watcher.sh"
