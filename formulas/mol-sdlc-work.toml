formula = "mol-sdlc-work"
description = """
SDLC worker lifecycle — single-session, multi-step. The implementation
half of the SDLC chain (pack #226): the planner pool committed the plan;
the worker resumes the planner's branch and implements against it. The
worker walks load-context, workspace-resume, capture-baseline, implement,
self-audit, and submit in one conversation, then hands the bead off to a
tester pool. No inter-session bead handoffs between the internal phases —
they are formula steps inside the same session.

## Worker contract (self-cleaning model)

1. Receive work (bead routed to your pool template, claimed via gc hook).
2. Follow steps in order — read each step description, execute, move on.
3. Submit: push branch, set metadata on work bead, route to tester pool, exit.
4. You are GONE — the tester validates; the reviewer audits; the documenter
   writes docs; the finalizer merges.

Work beads flow: pool → planner → worker → tester → reviewer →
documenter → finalizer → closed. Each transition between pools sets only
`gc.routed_to` (never `--assignee`); the supervisor's default
scale-check filters `--unassigned`.

## Failure modes

| Situation | Action |
|-----------|--------|
| Bounced from tester (red tests) | Resume from existing branch; fix the failure_summary; re-submit. |
| Bounced from reviewer (blocker) | Resume from existing branch; address rejection_reason; re-submit. |
| Plan missing on the branch | `workspace-resume` bounces to the planner pool once (`implement_blocked=plan_missing`); a second miss escalates. |
| Blocked on requirements | Mail witness; mark story `escalated`; drain-ack and exit. |
| Context filling | `gc runtime request-restart`; the new session resumes from `metadata.current_step`. |
| Sensitive file would change | The plan must declare it; submit step blocks if it changed without declaration. |
"""
version = 3

[vars.story_id]
description = "ID of the story bead to drive through the SDLC chain"
required = true


[[steps]]
id = "load-context"
title = "Read the bead and the rig's project context"
description = """
You are starting work on story bead {{story_id}}. Read everything you need
once, up front; do not return to this step later.

```bash
bd show {{story_id}} --json
```

Pay attention to the bead's `description` (the story's outcome and
acceptance criteria), `metadata.target` (the base branch — defaults to
the rig's default branch when absent), and any existing
`metadata.current_step` indicating a resumed run.

Then read the rig's project context:

- `CLAUDE.md` — domain context, stack, conventions, sensitive-files list (if any).
- `README.md` — what the project is, what it ships, what's out of scope.
- The rig's directory layout — where production code lives, where tests live.

Discipline rules in `.claude/rules/` auto-load on file edits as you work.
Do not read them eagerly here; their globs will fire when relevant.

Record that you've started:

```bash
PHASE="worker"
RIG="${GC_RIG:-unknown}"
bd update {{story_id}} \\
  --set-metadata "${PHASE}.session_id=${GC_SESSION_ID:-unknown}" \\
  --set-metadata "${PHASE}.started_at=$(date -Iseconds)" \\
  --set-metadata "rig=${RIG}" \\
  --set-metadata "current_step=workspace-resume"
```

**Exit criteria:** You have read the bead's description and the rig's
CLAUDE.md and README. You can name the outcome in one sentence and list
the acceptance criteria from memory.
"""


[[steps]]
id = "workspace-resume"
title = "Resume the planner's per-bead worktree, branch, and committed plan"
needs = ["load-context"]
description = """
The planner pool (formula `mol-sdlc-plan`) already created the per-bead
worktree and feature branch and committed `plans/{{story_id}}.md` to it.
Resume that workspace — do not create a new branch and do not write a
new plan. Every step is idempotent — safe to re-run after a crash or
restart.

**1. Fetch and read the handoff metadata:**

```bash
# pack #223: RIG_ROOT must be assigned from the supervisor's GC_RIG_ROOT;
# `:?` fails loud rather than running git against "".
RIG_ROOT="${GC_RIG_ROOT:?GC_RIG_ROOT must be set by the supervisor for workspace-resume}"
git -C "$RIG_ROOT" fetch --prune origin
BRANCH=$(bd show {{story_id}} --json | jq -r '.[0].metadata.branch // empty')
WORKTREE=$(bd show {{story_id}} --json | jq -r '.[0].metadata.work_dir // empty')
PLAN_FILE=$(bd show {{story_id}} --json | jq -r '.[0].metadata.plan_file // empty')
```

If `BRANCH` or `PLAN_FILE` is empty, the planner never completed its
handoff — skip to the plan-missing bounce (sub-step 4) without touching
the worktree.

**2. Ensure the bead-scoped worktree exists; recreate it from the pushed
branch if not.**

Worktrees are scoped to the bead, not the agent instance, so this is
normally the worktree the planner created. The recreation path mirrors
the rebase-iteration recovery in the worker template: worktree add from
`origin/$BRANCH`, re-record `work_dir`.

```bash
RIG_ROOT="${GC_RIG_ROOT:?GC_RIG_ROOT must be set}"   # pack #223: assign in each block (separate bash invocations don't share env)
if [ -z "$WORKTREE" ] || [ ! -d "$WORKTREE" ]; then
    # Worktree missing — recreate from origin/$BRANCH and re-record metadata.
    WORKTREE="$RIG_ROOT/.gc/worktrees/${GC_RIG}/sdlc/{{story_id}}"
    mkdir -p "$(dirname "$WORKTREE")"
    git -C "$RIG_ROOT" fetch origin "$BRANCH"
    git -C "$RIG_ROOT" worktree add "$WORKTREE" "origin/$BRANCH"
    bd update {{story_id}} --set-metadata work_dir="$WORKTREE"
fi
cd "$WORKTREE"
# Target the worktree explicitly with `git -C "$WORKTREE"` — never rely on
# the ambient cwd (pack #223 — a bare checkout can land on the rig root's
# HEAD if the cd above did not take effect).
git -C "$WORKTREE" checkout "$BRANCH"
```

On the normal path the planner left `$BRANCH` checked out and the
checkout is a no-op. On the recreation path the worktree starts detached
at `origin/$BRANCH` and the checkout creates the local tracking branch.

**3. Verify the committed plan is on the branch:**

```bash
[ -n "$PLAN_FILE" ] && [ -f "plans/{{story_id}}.md" ] && echo "plan present"
```

If the plan is present, record the step and move on:

```bash
bd update {{story_id}} --set-metadata current_step="capture-baseline"
```

**Exit criteria (happy path):** Current working directory is inside the
bead-scoped worktree. On the feature branch named in `metadata.branch`.
Working tree clean. `plans/{{story_id}}.md` present on the branch. The
bead's `current_step` is `capture-baseline`.

**4. The plan-missing bounce (ONE bounce, then escalate).**

Only reached when `metadata.plan_file` is missing, `metadata.branch` is
missing, or `plans/{{story_id}}.md` is absent from the branch. First
check whether the one-bounce budget is already spent:

```bash
IMPLEMENT_BLOCKED=$(bd show {{story_id}} --json | jq -r '.[0].metadata.implement_blocked // empty')
```

If `IMPLEMENT_BLOCKED` is already set, a previous worker session already
bounced this bead to the planner and the plan is still missing — do NOT
bounce again. Park it for a human instead:

```bash
REASON="plan still missing after a planner bounce (implement_blocked was already set)"
bd update {{story_id}} \\
  --set-metadata requires_human_decision=true \\
  --set-metadata "human_decision_reason=$REASON" \\
  --set-metadata "gc.routed_to=" \\
  --status=escalated --append-notes "workspace-resume blocked: $REASON"
WITNESS_TARGET="${GC_RIG:+$GC_RIG/}witness"
gc mail send "$WITNESS_TARGET" -s "ESCALATION: {{story_id}} — plan missing after planner bounce [HIGH]" \\
  -m "workspace-resume found no committed plan for {{story_id}} after a prior plan_missing bounce. Branch: ${BRANCH:-unset}. Human decision needed."
gc runtime drain-ack
exit
```

Otherwise spend the one bounce — route the bead back to the planner pool
so it can author and commit the missing plan:

```bash
RIG="${GC_RIG:-unknown}"
bd update {{story_id}} \\
  --status=open --assignee "" \\
  --set-metadata implement_blocked=plan_missing \\
  --set-metadata current_step="plan" \\
  --set-metadata gc.routed_to="$RIG/sdlc-discipline.planner" \\
  --append-notes "workspace-resume: no committed plan found; bounced to planner (implement_blocked=plan_missing)"
gc runtime drain-ack
exit
```
"""


[[steps]]
id = "capture-baseline"
title = "Snapshot the target branch's static-analysis baseline"
needs = ["workspace-resume"]
description = """
Capture ruff, mypy, suppression, and pytest-weakening counts for the
merge-base SHA against `metadata.target`. The tester reads this baseline
later and the gate fails only on findings the worker's branch
*introduces*, not on pre-existing baseline noise. This is what makes the
chain shippable on rigs whose `origin/$TARGET` has accumulated a static-
analysis backlog: the worker is held to anti-weakening discipline (no
new errors, no new suppressions, no removed assertions), not to a
zero-error standard the rig itself doesn't currently meet.

The baseline is keyed by SHA and cached in `$RIG_ROOT/.gc/cache/baselines/`,
so concurrent stories sharing the same merge-base share the cache.

```bash
TARGET=$(bd show {{story_id}} --json | jq -r '.[0].metadata.target // "main"')
BASELINE_SHA=$(git merge-base HEAD "origin/$TARGET")
RIG_ROOT="${GC_RIG_ROOT:?GC_RIG_ROOT must be set}"   # pack #223: assign before use (see workspace-resume)
RIG_ROOT_ABS=$(git -C "$RIG_ROOT" rev-parse --show-toplevel)
CACHE_DIR="$RIG_ROOT_ABS/.gc/cache/baselines/$BASELINE_SHA"
```

If the cache already exists for this SHA, skip recapture (idempotent
across resumes and across concurrent stories on the same target SHA):

```bash
if [ -f "$CACHE_DIR/sha.txt" ]; then
    bd update {{story_id}} \\
      --set-metadata gate.baseline_sha="$BASELINE_SHA" \\
      --set-metadata gate.baseline_cached="true" \\
      --set-metadata current_step="implement"
    echo "baseline cache hit: $CACHE_DIR"
    # exit step early — proceed to implement
fi
```

Otherwise, capture in a scratch worktree at the baseline SHA so the
capture sees the *target's* static-analysis state, not the branch's
work-in-progress:

```bash
mkdir -p "$CACHE_DIR"
SCRATCH=$(mktemp -d)
git worktree add --detach "$SCRATCH" "$BASELINE_SHA" >/dev/null
(
    cd "$SCRATCH"
    [ -f pyproject.toml ] && uv sync --group dev > /dev/null 2>&1
    python3 .claude/sdlc-discipline/sdlc-gate.py \\
        baseline --sha "$BASELINE_SHA" --out "$CACHE_DIR"
)
git worktree remove --force "$SCRATCH" >/dev/null
```

Note: `.claude/sdlc-discipline/sdlc-gate.py` is materialized into every
worktree by the planner's workspace-setup overlay propagation (formula
`mol-sdlc-plan`, step `workspace-setup`, sub-step 2a). The scratch worktree at the baseline
SHA also receives this propagation when its parent `.claude/` is
populated; if the rig's baseline SHA pre-dates the overlay, the script
won't be there. Recover by copying it explicitly from this worktree:

```bash
if [ ! -f "$SCRATCH/.claude/sdlc-discipline/sdlc-gate.py" ]; then
    mkdir -p "$SCRATCH/.claude/sdlc-discipline"
    cp .claude/sdlc-discipline/sdlc-gate.py \\
       "$SCRATCH/.claude/sdlc-discipline/sdlc-gate.py"
fi
```

Record the SHA on the bead so the tester knows which cache entry to
read:

```bash
bd update {{story_id}} \\
  --set-metadata gate.baseline_sha="$BASELINE_SHA" \\
  --set-metadata gate.baseline_cached="false" \\
  --set-metadata current_step="implement"
```

**Exit criteria:** `$CACHE_DIR/{ruff,mypy,suppressions,pytest-weakening}.json`
and `sha.txt` exist. The bead has `gate.baseline_sha` set. Scratch
worktree removed. Current step is `implement`.
"""


[[steps]]
id = "implement"
title = "Walk the plan's steps in order"
needs = ["capture-baseline"]
description = """
Execute the plan's steps in order. Each step is shaped per the plan's
marker — `red-green-refactor` or `pin-after-implementation`.

For `red-green-refactor` steps:

1. **Red.** Write the test named in the plan. Run `uv run pytest <path> -v`.
   Confirm it fails for the right reason. If it fails for a different
   reason, fix the misunderstanding before writing implementation code.
2. **Green.** Implement the minimum code to make the test pass. Don't
   over-implement — only the named behavior.
3. **Refactor (local pass).** Clean up the immediate change under green
   tests. Apply only refactorings from the catalog (Extract Function,
   Rename, etc. — see `refactoring.md` when its glob fires). If you
   cannot name the move from the catalog, you are not refactoring; you
   are rewriting. Stop.

For `pin-after-implementation` steps: implement first, then add the
regression-pinning test. The test should still be behavior-named and
fail-clean if the underlying implementation regresses.

## Refactor (global pass) — REQUIRED after all plan steps complete

After every plan step is implemented and tests are green, do not move
on to commits or self-audit yet. Take a global view of your entire diff
in the context of the current codebase. This is non-negotiable: the
local-pass refactor in the R/G/R cycle covers your immediate change;
this global pass covers the *composition* of your changes with the
existing codebase.

The questions to ask:

1. **Module cap.** For each file your diff touched, count its public
   names after the change. If any file is now over the modularity cap
   (≤ 7 public names per module per `modularity.md`), the thing you
   added probably belongs elsewhere, OR the existing file is overdue
   for decomposition. Either way, act on it now.

2. **Cohesion.** For each new type, function, or class you added, ask
   where a future engineer would expect to find this. If your answer
   differs from where you put it, MOVE IT via Move Function or Move
   Field from the catalog. The story spec's "In:" scope is a guideline,
   not a constraint — if the spec directed you to add a type to file X
   but a better home exists (especially in a module you also created
   in this same story), override the spec and move the type. Document
   the override in your plan with one sentence of justification.

3. **Nearby smells.** Look at modules adjacent to your diff — direct
   imports, callers, callees. Did your addition reveal a smell from
   the refactoring catalog (Duplicated Code, Long Function, Divergent
   Change, Shotgun Surgery, Feature Envy, Large Class, Data Class with
   only fields)? Name the smell explicitly. If you can name it, refactor
   it. Each refactor is its own `refactor:` commit per Two Hats.

4. **Scope freedom.** You may modify nearby modules even if they
   weren't in your spec's "In:" scope, as long as the refactor is
   behavior-preserving and named from the catalog. Behavior-preserving
   means tests pass before and after with no test modifications.

After the global pass, your plan MUST contain one of:

- **A list of `refactor:` commits applied**, with each commit naming
  the move (from the Fowler catalog) and the smell it addressed, OR
- **An explicit statement**: `Reviewed post-green refactor
  opportunities: none. Justification: <one sentence stating which
  files were reviewed and why no opportunity was found.>`

This forcing function is mandatory. Submit-and-exit blocks if the
plan doesn't contain one of the two evidence forms.

## Commits

Atomic per behavior. The Two-Hats discipline binds at the **hat**
boundary, not the artifact boundary — bundling a feature with its
pinning test in one commit is fine; bundling a feature with an
unrelated refactor is not. Use these prefixes:

- `feat(<area>): <behavior>` — a new behavior plus its pinning
  test(s) committed together as one atomic change. The diff includes
  both the production code and the test that pins it.
- `test(<area>): pin <behavior>` — a test added for a behavior
  already implemented (pin-after-implementation steps), or a
  characterization test pinning existing behavior before refactoring.
- `refactor(<area>): <move-name from catalog>` — pure restructuring,
  no behavior change. Always its own commit. Never bundled with `feat:`.
- `chore(<area>): <housekeeping>` — lints, type-noqa, tooling fixes.
  Always its own commit.

The safety net of refactoring is the ability to revert one *behavior*
or one *refactor* as a unit. Splitting feat from test buys nothing the
diff doesn't already show; splitting feat from refactor buys real
clarity when a downstream test breaks. Squashing is the documenter's
call at merge time, not yours.

## Discipline rules

The rig's `.claude/rules/` directory has the discipline rules. They
auto-load when you edit matching files. Notable ones for this step:

- `python.md` — function bodies under 25 lines, prose-only docstrings,
  no `dict[str, Any]` returns, specific exception types, type hints
  everywhere, f-strings only, no bare except.
- `tdd.md` — behavior-named tests, diagnostic messages on assertions
  in domain language, mocks are peers (not internals), allowances vs.
  expectations distinction.
- `code-structure.md` — Tell-Don't-Ask, return typed output don't
  mutate shared state, domain-typed equality.
- `modularity.md` — ≤7 public names per module, no fat connections,
  specific resource ownership.
- `refactoring.md` — Two Hats, the catalog of moves, R/G/R rhythm.

If a rule fires and contradicts what you're about to do, the rule wins.

## Sensitive files

If your plan declared sensitive files, edit them only as the plan said.
If a step would touch a sensitive file the plan did not declare, STOP.
Update the plan first (this step is allowed to amend `plans/{{story_id}}.md`),
then proceed.

## When done

```bash
bd update {{story_id}} --set-metadata current_step="self-audit"
```

**Exit criteria:**

- Every plan step has a corresponding atomic commit (`feat:` for
  red-green-refactor steps, `test: pin` for pin-after-implementation
  steps; refactor and chore commits separate where present).
- The working tree is clean. The branch contains commits in plan
  order, not jumbled.
- The plan contains global-pass refactor audit evidence — either
  applied `refactor:` commits naming their moves, OR an explicit
  "Reviewed post-green refactor opportunities: none. Justification:
  ..." statement. Without one or the other, implement is not done.
"""


[[steps]]
id = "self-audit"
title = "Lint, type-check, and audit your work against the rule self-audits before handoff"
needs = ["implement"]
description = """
A tight pre-handoff gate. Four checks, all pass-or-fix, none of them
require walking long checklists. The discipline rules in
`.claude/rules/` auto-load on file edits during the implement step;
they fire when relevant and have already constrained the code that
arrived here. This step does not re-walk those audits — it verifies
that the deterministic gates (lint, types, plan coverage,
sensitive-files) are clean.

You do NOT run the full pytest suite here — that is the tester pool's
job. The tester runs in a fresh-context session with its own LLM
budget, which is the right place to investigate test failures.

## Gate 1 — Differential static-analysis (lint, types, anti-weakening)

The pre-handoff gate is the same differential check the tester runs in
fresh-context. Reads the baseline captured in `capture-baseline`,
compares the branch's current state, fails on **introduced** ruff or
mypy errors, **introduced** suppression directives, **introduced**
pytest skip/xfail markers, or **lost** assertion counts. Pre-existing
baseline noise is tolerated; weakening the branch to mask new failures
is not.

```bash
BASELINE_SHA=$(bd show {{story_id}} --json | jq -r '.[0].metadata."gate.baseline_sha"')
RIG_ROOT="${GC_RIG_ROOT:?GC_RIG_ROOT must be set}"   # pack #223: assign before use (see workspace-resume)
RIG_ROOT_ABS=$(git -C "$RIG_ROOT" rev-parse --show-toplevel)
CACHE_DIR="$RIG_ROOT_ABS/.gc/cache/baselines/$BASELINE_SHA"

# pack #199: pass a spec-declared assertion-loss migration waiver (JSON
# string in bead metadata) to the gate, which verifies it mechanically and
# downgrades a matching D.asserts loss to advisory. Absent → no extra arg.
WAIVER=$(bd show {{story_id}} --json | jq -r '.[0].metadata.assertion_loss_waiver // empty')
WAIVER_ARGS=()
[ -n "$WAIVER" ] && WAIVER_ARGS=(--assertion-loss-waiver "$WAIVER")

python3 .claude/sdlc-discipline/sdlc-gate.py diff --baseline-dir "$CACHE_DIR" "${WAIVER_ARGS[@]}"
GATE_RC=$?
```

Verdict semantics:

- **`pass` (exit 0, blocks empty):** all gates clean; proceed.
- **`advisory` (exit 0, blocks empty, advisories present):** soft signals
  for reviewer attention (cross-file relocations whose global net is
  non-positive, test-file deletions). Note them in the plan if the story
  did not anticipate them; proceed.
- **`fail` (exit 1):** at least one block. Each block names a check
  (`A.ruff`, `A.mypy`, `B`, `D.skips`, `D.asserts`) and the offending
  files/codes. Fix as `chore(lint):` / `chore(types):` / `chore(test):`
  per category; do not weaken to silence; rerun the gate.

## Gate 2 — Plan coverage

Read `plans/{{story_id}}.md` again. For each `- [ ]` line in the
Acceptance criteria section, name the test that pins it. If any
criterion has no pinning test, write the test now and amend the
implement step's commit sequence. Do not assume the tester will catch
a missing-test gap.

```bash
grep '^- \\[ \\]' plans/{{story_id}}.md
```

For each criterion the grep prints, confirm a test exists. The
relationship is one criterion → at least one named test.

## Gate 3 — Sensitive-files declaration

```bash
PLANNED=$(awk '/## Sensitive files/{flag=1; next} /^## /{flag=0} flag' plans/{{story_id}}.md)
TARGET=$(bd show {{story_id}} --json | jq -r '.[0].metadata.target // "main"')
CHANGED=$(git diff --name-only "origin/$TARGET")
```

If any path in `CHANGED` matches an entry in the rig's `CLAUDE.md`
sensitive-files list and is not declared in `PLANNED`: STOP. Update
the plan to declare the file and commit the amendment as
`docs(plan): declare <path> as touched`, then re-run this step.

## Gate 4 — Global-pass refactor audit evidence

The implement step's global-pass refactor discipline requires evidence
in the plan that the post-green audit happened. This gate verifies that
evidence is present. Without it, implement is not done — the worker
either skipped the audit or didn't record the result.

```bash
EVIDENCE=$(grep -cE '^(refactor:|Reviewed post-green refactor)' plans/{{story_id}}.md)
```

The plan must contain either:

- **One or more `refactor:` lines** documenting moves applied during the
  global pass, each naming the Fowler catalog move and the smell it
  addressed (matches the pattern `refactor: <move> [smell: <name>]` or
  similar — the recognizable shape is "refactor:" prefix in the plan's
  refactor-evidence section, alongside the move name).
- **OR a "Reviewed post-green refactor opportunities" statement** with
  a one-sentence justification of which files were reviewed and why no
  opportunity was found.

If `EVIDENCE` is zero: STOP. Return to the implement step and complete
the global-pass audit. Update the plan with the evidence. Re-run this
step.

## Recording

```bash
bd update {{story_id}} --set-metadata current_step="submit-and-exit"
```

**Exit criteria:** All four gates pass. Differential gate green (no
introduced ruff/mypy errors, no introduced suppressions, no new skip
markers, no lost asserts). Every acceptance criterion has a pinning
test. No undeclared sensitive-file edits. Global-pass refactor audit
evidence is recorded in the plan. The bead's `current_step` is
`submit-and-exit`.
"""


[[steps]]
id = "submit-and-exit"
title = "Push branch, route to tester pool, drain-ack, exit"
needs = ["self-audit"]
description = """
Hand off your work and clean up. You cease to exist after this step.

**1. Verify clean working state:**

```bash
git status --porcelain
```

If anything outputs, you have uncommitted work. Either commit it under
the right hat (feat/test/refactor/chore) or stash and investigate. Never
push with untracked work left behind.

**2. Commit any plan amendment to the feature branch.**

The planner pool committed the plan at `plans/{{story_id}}.md`; this
story was implemented against it. The implement and self-audit steps may
have amended it (refactor-audit evidence, sensitive-file declarations) —
commit the amendment so the audit trail survives the next worker
rotation.

```bash
git add -f plans/{{story_id}}.md
if ! git diff --cached --quiet; then
    git commit -m "docs(plan): {{story_id}} — implementation plan"
fi
```

`git diff --cached --quiet` skips the commit if the plan on the branch
is already current (the normal case when no amendment was needed — the
planner committed it). The `-f` flag forces the add even on rigs whose `.gitignore`
excludes `plans/` (a common pattern in rigs that pre-date the pack's
audit-trail requirement). The plan is the contract this story was
built against; the pack treats it as committed history regardless of
the rig's local gitignore.

**3. Push the branch (or skip gracefully on no-remote rigs):**

```bash
if git remote get-url origin >/dev/null 2>&1; then
    git push -u origin "$(git branch --show-current)"
else
    bd update {{story_id}} --set-metadata worker.push_skipped="no_remote_configured"
fi
```

When the rig has no `origin` remote (local-only project, validation rig, etc.), the branch stays in the rig's local refs. The tester, reviewer, documenter, and finalizer all detect the same condition and use shared local refs to access the branch. The chain proceeds without a remote.

If `SDLC_OPEN_PR_DEFAULT=true` for this rig, also open the PR (only meaningful when origin exists):

```bash
if [ "${SDLC_OPEN_PR_DEFAULT:-false}" = "true" ]; then
    PR_URL=$(gh pr create \\
        --title "$(bd show {{story_id}} --json | jq -r '.[0].title')" \\
        --body-file plans/{{story_id}}.md \\
        --base "$(bd show {{story_id}} --json | jq -r '.[0].metadata.target // "main"')" \\
        2>&1 | grep -oP 'https://github.com/[^ ]+')
    bd update {{story_id}} --set-metadata pr_url="$PR_URL"
fi
```

If `SDLC_OPEN_PR_DEFAULT=false`, the branch sits on the remote (or
locally only) for the documenter or human operator to PR later.

**4. Record metadata for cost-rollup and handoff:**

```bash
bd update {{story_id}} \\
  --set-metadata target="$(bd show {{story_id}} --json | jq -r '.[0].metadata.target // "main"')" \\
  --set-metadata branch="$(git branch --show-current)" \\
  --set-metadata worker.completed_at="$(date -Iseconds)" \\
  --set-metadata current_step="tester"
```

**5. Route to the tester pool.** Tester is a pool agent (no
`[[named_session]]`), so set ONLY `gc.routed_to`. Setting `--assignee` would
make the bead "assigned" and the supervisor's default scale-check
(filters `--unassigned`) would not see the demand; the pool would stay
at min=0 and the chain would stall.

```bash
RIG="${GC_RIG:-unknown}"
TESTER_TARGET="$RIG/sdlc-discipline.tester"
bd update {{story_id}} --status=open --assignee "" --set-metadata gc.routed_to="$TESTER_TARGET"
```

**6. Drain and exit:**

```bash
gc runtime drain-ack
exit
```

`gc runtime drain-ack` tells the reconciler to kill this session. The
reconciler only respawns a worker if the pool sees more bead demand.
You are done. Done means gone.

**Exit criteria:** Branch pushed; bead routed to tester pool; metadata
includes `branch`, `target`, `worker.completed_at`; session drained.
"""
